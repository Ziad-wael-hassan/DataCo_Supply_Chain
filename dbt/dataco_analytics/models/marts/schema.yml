version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders_raw

models:
  - name: stg_orders
    description: "Cleaning / Silver layer — all type casting, renaming, trimming, coalescing, and column selection happens here."
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_card_id
        tests:
          - not_null
      - name: date_key
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_card_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: dim_shipping_location
    description: "Shipping destination dimension with surrogate key."
    columns:
      - name: shipping_location_id
        tests:
          - unique
          - not_null

  - name: fact_order_items
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_card_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_card_id
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: shipping_location_id
        tests:
          - relationships:
              to: ref('dim_shipping_location')
              field: shipping_location_id
